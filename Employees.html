<script>
  // state
  let sheetData = [];
  let headerNames = [];
  // عمود الكود = B
// B = index 1 (لأن العد بيبدأ من 0)
let codeColumnindex = 1; // عمود B
  let filterableindexes = [];
  let userInteracted = false; // يظهر النتائج بعد التفاعل من المستخدم


  // pinned cards: store string ids (we use original row index where possible)
  let pinnedCards = new Set();
  let lastRenderedResults = []; // array of rows currently rendered (filtered)
  let lastRenderMap = {}; // map cardId -> row for quick access


  // load pinned from sessionStorage
  function loadPinnedFromSession() {
    try {
      const raw = sessionStorage.getItem('pinnedCards');
      if (raw) {
        const arr = JSON.parse(raw);
        pinnedCards = new Set(arr);
      }
    } catch (e) {
      pinnedCards = new Set();
    }
  }
  function savePinnedToSession() {
    try {
      sessionStorage.setItem('pinnedCards', JSON.stringify(Array.from(pinnedCards)));
    } catch(e){}
  }

function showExcelLoading(text = "جاري تحميل ملف الأكسل...") {
  const overlay = document.getElementById("excelLoadingOverlay");
  if (!overlay) return;
  overlay.querySelector("div:last-child").textContent = text;
  overlay.style.display = "flex";
}

function hideExcelLoading() {
  const overlay = document.getElementById("excelLoadingOverlay");
  if (!overlay) return;
  overlay.style.display = "none";
}

  // download (export) => send pinned rows first (in order), then filtered rows (without duplicates)
  function downloadFile(type) {
    // build exportRows as arrays (matching sheet rows)
    const exportRows = [];
    const added = new Set();


// لو فيه كروت مثبتة → ننزل المثبتة فقط
if (pinnedCards.size > 0) {


  pinnedCards.forEach(cardId => {
    const r = findRowByCardId(cardId);
    if (r) exportRows.push(r.slice());
  });


} else {
  // لو مفيش مثبّت → نزل نتائج البحث الحالية
  lastRenderedResults.forEach(rInfo => {
    exportRows.push(rInfo.row.slice());
  });
}


if (exportRows.length === 0) {
  alert("لا توجد بيانات لتصديرها");
  return;
}


showExcelLoading(type === "excel" ? "جاري تحميل ملف الأكسل..." : "جاري تحميل ملف PDF...");

google.script.run
  .withFailureHandler(err => {
    hideExcelLoading();
    alert("خطأ: " + err);
  })
  .withSuccessHandler(url => {
    if (url) window.open(url, "_blank");

    setTimeout(() => {
      hideExcelLoading();
    }, 800);
  })
  .exportEmployeesFile(type, exportRows);




    if (!exportRows || exportRows.length === 0) {
      alert("لا توجد بيانات لتصديرها");
      return;
    }

  }


  // helper to find row in original sheetData by cardId (cardId is originalindex as string)
  function findRowByCardId(cardId) {
    if (!cardId) return null;
    // cardId format: "idx:<n>"
    if (cardId.startsWith("idx:")) {
      const idx = Number(cardId.substring(4));
      if (!isNaN(idx) && sheetData[idx]) return sheetData[idx];
    }
    // fallback: try to find by matching stringified row
    for (let i=0;i<sheetData.length;i++){
      if (JSON.stringify(sheetData[i]) === cardId) return sheetData[i];
    }
    return null;
  }


  // toggle pin
  function togglePinCard(checkbox, cardId) {
    if (!cardId) return;
    if (checkbox.checked) pinnedCards.add(cardId);
    else pinnedCards.delete(cardId);
    savePinnedToSession();
    // re-render but preserve current filters/search
    renderWithCurrentState();
  }

function extractBirthDateFromNID(nid) {
  if (!nid || nid.length !== 14) return null;

  let century = nid[0] === "2" ? 1900 : 2000;
  let year = century + parseInt(nid.substring(1, 3));
  let month = parseInt(nid.substring(3, 5));
  let day = parseInt(nid.substring(5, 7));

  return new Date(year, month - 1, day);
}

function calculateAge(birthDate) {
  if (!birthDate) return "";

  let today = new Date();
  let age = today.getFullYear() - birthDate.getFullYear();

  let m = today.getMonth() - birthDate.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
    age--;
  }

  return age;
}

function formatDate(date) {
  if (!date) return "";
  return date.toLocaleDateString("ar-EG");
}

  // normalize text for search

function highlightMatch(text, keyword){

  if(!keyword) return text;

  let normalizedKeyword = normalize(keyword);

  return text.replace(/[\u0621-\u064A]+/g, function(word){

    if(normalize(word).includes(normalizedKeyword)){
      return '<span class="search-highlight">' + word + '</span>';
    }

    return word;
  });

  if (!sheetData.length || !filterableindexes.length) {

  // ⛔ لسه المستخدم ما عملش أي تفاعل

  let activeFilters = {};
  document.querySelectorAll("#filters select").forEach(sel => {
    let col = sel.getAttribute("data-col");

  // ===== لو مفيش أي فلتر خالص =====
  if (!txt && !codeTxt && Object.keys(activeFilters).length === 0
      && !ageEqVal && !ageGtVal && !ageLtVal) {

    // لو العمر مش متحسب → استبعد
    if (age === null) return false;

    // ===== فلتر العمر =====
    let ageEq = parseInt(ageEqVal);
    let ageGt = parseInt(ageGtVal);
    let ageLt = parseInt(ageLtVal);

    let ageGtType = document.getElementById("ageGreaterType")?.value;
    let ageLtType = document.getElementById("ageLessType")?.value;

    // 🎯 أولوية = (يساوي)
    if (!isNaN(ageEq)) {
      if (age !== ageEq) return false;
    } else {

      // أكبر
      if (!isNaN(ageGt)) {
        if (ageGtType === ">" && !(age > ageGt)) return false;
        if (ageGtType === ">=" && !(age >= ageGt)) return false;
      }

      // أصغر
      if (!isNaN(ageLt)) {
        if (ageLtType === "<" && !(age < ageLt)) return false;
        if (ageLtType === "<=" && !(age <= ageLt)) return false;
      }

    }

    // ===== البحث العام =====
    if (txt) {
      let rowText = normalize(row.join(" "));
      if (!rowText.includes(txt)) return false;
    }

    // ===== البحث بالكود =====

      cellValue = cellValue.toString().trim();
      if (cellValue !== codeTxt) return false;
    }

    // ===== باقي الفلاتر =====
    for (let col in activeFilters) {
      if (row[col] != activeFilters[col]) return false;
    }

    return true;
  });

function cleanPhoneNumber(phone){
  if(!phone) return "";

  let p = phone.toString()
    .replace(/[٠]/g,"0")
    .replace(/[١]/g,"1")
    .replace(/[٢]/g,"2")
    .replace(/[٣]/g,"3")
    .replace(/[٤]/g,"4")
    .replace(/[٥]/g,"5")
    .replace(/[٦]/g,"6")
    .replace(/[٧]/g,"7")
    .replace(/[٨]/g,"8")
    .replace(/[٩]/g,"9")
    .replace(/[^0-9+]/g,"");

  if(p.startsWith("00")) p = "+" + p.substring(2);

  if(p.startsWith("01")) {
    p = "+2" + p;
  }

  return p;
}

function callEmployee(phone){
  const p = cleanPhoneNumber(phone);
  if(!p) return;
  window.location.href = "tel:" + p;
}

function openWhatsApp(phone){
  const p = cleanPhoneNumber(phone);
  if(!p) return;

  const phoneClean = p.replace("+","");
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isMobile) {
    // 📱 موبايل → Open With
    window.location.href =
      "intent://send?phone=" + phoneClean + "#Intent;scheme=whatsapp;end";

  } else {
    // 💻 كمبيوتر

    let appOpened = false;

    // لو الصفحة فقدت التركيز → غالبًا التطبيق فتح
    const blurHandler = () => {
      appOpened = true;
    };

    window.addEventListener("blur", blurHandler);

    // محاولة فتح التطبيق
    window.location.href = "whatsapp://send?phone=" + phoneClean;

    // بعد وقت بسيط نشوف هل اتفتح ولا لا
    setTimeout(function(){

      window.removeEventListener("blur", blurHandler);

      if (!appOpened) {
        // التطبيق ما فتحش → افتح Web
        window.open(
          "https://web.whatsapp.com/send?phone=" + phoneClean,
          "_blank"
        );
      }

    }, 1200);
  }
}

<script>
  const micBtn = document.getElementById('micBtn');
const searchInput = document.getElementById('searchInput');

const SpeechRecognition =
  window.SpeechRecognition || window.webkitSpeechRecognition;

function smartFilterFromSpeech(text) {
  const normalizedText = normalize(text);
// ===== أوامر مسح البحث =====
if (detectClearCommand(text)) return;

function detectClearCommand(spokenText) {
  const clearWords = [
    'مسح','امسح','شيل','شيل البحث',
    'الغى البحث','الغاء البحث',
    'نظف','فضي','افرغ'
  ];

  const n = normalize(spokenText);

  if (clearWords.some(w => n.includes(w))) {
    // مسح البحث
    searchInput.value = '';

    // مسح كل الفلاتر
    document.querySelectorAll('#filters select').forEach(sel => {
      sel.value = '';
    });

    userInteracted = false;
    document.getElementById("results").innerHTML =
      "<div style='padding:20px; text-align:center;'>تم مسح البحث والفلاتر</div>";

    return true;
  }
  return false;
}

  // كلمات تجاهل
  const stopWords = [
    'دور','دورلي','ابحث','ابحثلي','ابحث عن','هات','شوف','عايز',
    'على','عن','في','من','اللي','اللى','الموظف','الموظفين'
  ];

  let workingText = normalizedText;
  stopWords.forEach(w => {
    workingText = workingText.replace(new RegExp(`\b${w}\b`, 'g'), '');
  });

  // محاولة مطابقة كل القوائم المنسدلة
  let detectedFilters = [];
 document.querySelectorAll('#filters select').forEach(sel => {
  const headerName = sel.options[0]?.textContent || '';

  // تجاهل فلتر التخصص في البحث الصوتي
  if (headerName.includes('التخصص')) return;

  [...sel.options].forEach(op => {
    if (!op.value) return;
    if (workingText.includes(normalize(op.value))) {
      sel.value = op.value;
      detectedFilters.push(normalize(op.value));
    }
  });
});


  // إزالة الكلمات التي استخدمت كفلاتر
  detectedFilters.forEach(f => {
    workingText = workingText.replace(new RegExp(f, 'g'), '');
  });

  workingText = workingText.replace(/\s+/g,' ').trim();

  // الباقي اسم شخص
  searchInput.value = workingText;
  onUserInteraction();
}

if (SpeechRecognition && micBtn) {
  const recognition = new SpeechRecognition();
  recognition.lang = 'ar-EG';
  recognition.continuous = false;
  recognition.interimResults = false;

  micBtn.onclick = () => {
    recognition.start();
    micBtn.textContent = '🎙️';
  };

  recognition.onresult = e => {
    const spoken = e.results[0][0].transcript;
    smartFilterFromSpeech(spoken);
    micBtn.textContent = '🎤';
  };

  recognition.onerror = () => {
    micBtn.textContent = '🎤';
  };
}

</script>
